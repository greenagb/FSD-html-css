<body>
    <!-- inline css bgcolor, font color, text align -->
    <h1 style="background-color: lightgreen ; color:white ; text-align: center;">Hello World</h1>
    <!--inline css-  font size , font weight, font style -->
    <p style="font-size: 20px; font-weight: bold; font-style: italic;">Lorem ipsum dolor sit amet consectetur adipisicing elit. Distinctio, quidem blanditiis rerum incidunt, hic ducimus neque maiores eos quibusdam minima natus? Sed non optio quam consequatur similique ea ducimus nostrum.</p>
    <!-- text-decore types- solid, dotted, dashed, double -->
    <h2 style="text-decoration: double underline green;">CSS day1</h2>
    <button style="background-color: rgb(222, 96, 96);  color:azure ; padding: 10px; border: 3px rgb(243, 112, 4) solid;border-radius: 15px;">Click me</button>
