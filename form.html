<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms in HTML</title>
  </head>
  <body>
    <h1>HTML Forms</h1>
    <form>
      <label for="name">Name</label>
      <input id="name" type="text" placeholder="Enter your name" />
      <br /><br />
      <label for="Age">Age</label>
      <input type="number" id="Age" placeholder="Enter your Age" />
      <br />
      <br />
      <label for="email">Email</label>
      <input type="email" name="" id="email" placeholder="Enter your email" />
      <br />
      <br />
      <label for="ph">Phone Number</label>
      <input
        type="number"
        name=""
        id="ph"
        placeholder="Enter your phone number"
      />
      <br />
      <br />
      <label for="dob">DOB</label>
      <input
        type="date"
        name=""
        id="dob"
        placeholder="Enter your date of birth"
      />
      <br />
      <br />
      <label for="dt">Date-Time</label>
      <input
        type="datetime-local"
        name=""
        id="dt"
        placeholder="Select date and time"
      />
      <br />
      <br />
      <label for="cr">Fav Color</label>
      <input type="color" name="" id="cr" placeholder="select your fav color" />
      <br />
      <br />
      <!-- Password -->
      <label for="pswd">Password</label>
      <input type="password" name="" id="pswd" />
      <br /><br />
      <!-- Gender -->
      <label for="">Gender</label><br />
      <input type="radio" name="gender" id="male" />
      <label for="male">Male</label>
      <input type="radio" name="gender" id="Female" />
      <label for="Female">Female</label>
      <input type="radio" id="other" name="gender" />
      <label for="other">Others</label>
      <!-- Checkbox -->
      <br />
      <br />
      <label for="">Hobbies</label>
      <br />
      <input type="checkbox" name="" id="dance" />
      <label for="dance">Dancing</label>
      <input type="checkbox" name="" id="read" />
      <label for="read">Reading</label>
      <input type="checkbox" name="" id="sing" />
      <label for="sing">Singing</label>
      <br><br>
      <label for="Address">Address</label>
      <textarea name="" rows="10"cols="50" id="Address"></textarea>
      <br><br>
      <input type="file" name="" id="">
      <button>Reset</button>
      <input type="button" value="Submit">
      <input type="submit" value="Submit2">
    </form>
  </body>
</html>
